name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # inkwell's llvm-sys (LLVM 22.x) looks for this prefix to find the toolchain.
  LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
  # Strict: any compiler/rustdoc warning is a hard error in build, test, and doc.
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install LLVM 22 and system dependencies
        run: |
          set -euxo pipefail
          # libgc-dev provides Boehm GC (GC_malloc / GC_init), used by the runtime.
          # `quilon build` emits the object in-process and links with the system C
          # toolchain; the JIT/AOT parity gate exercises BOTH linkers, so install
          # gcc AND clang. (llc still ships with LLVM for the manual compile flow.)
          sudo apt-get update
          sudo apt-get install -y libgc-dev gcc clang
          # Install LLVM 22 via the official apt script (sets up the apt.llvm.org repo
          # and installs clang/llc-22). LLVM 22 currently lives in apt.llvm.org's
          # development channel.
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          # inkwell links llvm-sys *statically* by default, which needs the LLVM dev
          # libraries including the Polly static lib (libPolly.a). llvm.sh alone does
          # not install these, so pull them in explicitly.
          sudo apt-get install -y llvm-22-dev libpolly-22-dev
          # Make the unversioned `llc` resolve to the LLVM 22 build for the AOT step.
          sudo ln -sf /usr/lib/llvm-22/bin/llc /usr/local/bin/llc
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      # Strict: clippy warnings (including its lints over all targets/features) are errors.
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets --verbose

      - name: Test
        run: cargo test --verbose
